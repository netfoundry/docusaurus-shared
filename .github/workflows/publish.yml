name: build and deploy docs

concurrency:
  group: publish-docs
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to build"
        required: true
        default: "main"
  push:
    branches:
      - main
      - '*-stg'
    paths-ignore:
      - '.github/**'
  schedule:
    - cron: '0 2 * * *' # run at 2 AM UTC to keep companion microsites updated e.g. swift SDK docs

jobs:
  publish-docs-from-container:
    name: Publish NF Docs
    if: github.repository_owner == 'netfoundry' && contains(github.event.head_commit.message, 'ci skip') == false
    runs-on: ubuntu-latest
    env:
      DOCUSAURUS_PUBLISH_ENV: 'prod'
      GIT_BRANCH: ${{ github.event.inputs.branch || github.ref_name }}
      gh_ci_key: ${{ secrets.GH_CI_KEY }}
      ziti_ci_gpg_key: ${{ secrets.ZITI_CI_GPG_KEY }}
      ziti_ci_gpg_key_id: ${{ secrets.ZITI_CI_GPG_KEY_ID }}

      # these are defined in github secrets: repo/settings/secrets/actions
      STG_DOC_SSH_HOST: ${{ secrets.STG_DOC_SSH_HOST }}
      STG_DOC_SSH_PORT: ${{ secrets.STG_DOC_SSH_PORT }}
      STG_DOC_SSH_TARGET_DIR: ${{ secrets.STG_DOC_SSH_TARGET_DIR }}
      STG_DOC_SSH_USER: ${{ secrets.STG_DOC_SSH_USER }}
      STG_KEY_FILE: ${{ secrets.STG_KEY_FILE }}
      DEV_DOC_SSH_HOST: ${{ secrets.DEV_DOC_SSH_HOST }}
      DEV_DOC_SSH_PORT: ${{ secrets.DEV_DOC_SSH_PORT }}
      DEV_DOC_SSH_TARGET_DIR: ${{ secrets.DEV_DOC_SSH_TARGET_DIR }}
      DEV_DOC_SSH_USER: ${{ secrets.DEV_DOC_SSH_USER }}
      DEV_KEY_FILE: ${{ secrets.DEV_KEY_FILE }}
      PROD_DOC_SSH_HOST: ${{ secrets.PROD_DOC_SSH_HOST }}
      PROD_DOC_SSH_PORT: ${{ secrets.PROD_DOC_SSH_PORT }}
      PROD_DOC_SSH_TARGET_DIR: ${{ secrets.PROD_DOC_SSH_TARGET_DIR }}
      PROD_DOC_SSH_USER: ${{ secrets.PROD_DOC_SSH_USER }}
      PROD_KEY_FILE: ${{ secrets.PROD_KEY_FILE }}

      # these are defined in a github environment: repo/settings/environments
      ZITI_HOTJAR_APPID: ${{ secrets.ZITI_HOTJAR_APPID }}
    environment: ${{ github.event.inputs.environment || (github.ref_name == 'main' && 'main' || 'stg') }}
    outputs:
      has_drift: ${{ steps.drift-ctx.outputs.has_drift }}
    steps:
      - name: Checkout Workspace
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen wget curl jq

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: unified-doc/yarn.lock

      - name: Install csvtojson
        run: npm install -g csvtojson

      - name: Restore sitemap baseline
        uses: actions/cache/restore@v4
        with:
          path: unified-doc/sitemap-baseline.xml
          key: sitemap-baseline-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            sitemap-baseline-${{ github.ref_name }}-

      - name: Archive input sitemap baseline
        if: hashFiles('unified-doc/sitemap-baseline.xml') != ''
        uses: actions/upload-artifact@v4
        with:
          name: sitemap-baseline-input
          path: unified-doc/sitemap-baseline.xml
          retention-days: 90

      - name: Setup SSH
        run: |
          mkdir -p $HOME/.ssh
          echo "${ZITI_CI_GH_KEY}"    | base64 -d > $HOME/.ssh/id_ed25519_gh
          echo "${JENKINS_CI_BB_KEY}" | base64 -d > $HOME/.ssh/id_ed25519_bb
          chmod 600 $HOME/.ssh/id_ed25519_*

          ssh-keyscan github.com >> $HOME/.ssh/known_hosts
          ssh-keyscan bitbucket.org >> $HOME/.ssh/known_hosts

          cat >> $HOME/.ssh/config <<'EOF'
          Host github.com
            IdentityFile ~/.ssh/id_ed25519_gh
            IdentitiesOnly yes
            StrictHostKeyChecking accept-new

          Host bitbucket.org
            IdentityFile ~/.ssh/id_ed25519_bb
            IdentitiesOnly yes
            StrictHostKeyChecking accept-new
          EOF
        env:
          ZITI_CI_GH_KEY: ${{ secrets.ZITI_CI_GH_KEY }}
          JENKINS_CI_BB_KEY: ${{ secrets.JENKINS_CI_BB_KEY }}

      - name: Build & Publish Docusaurus Site
        env:
          GITHUB_TOKEN: ${{ github.token }}
          ZITI_HOTJAR_APPID: ${{ secrets.PROD_DOC_HOTJAR_APPID }}
          DEPLOY_ENV: 'kinsta'
          DOCUSAURUS_URL: 'https://netfoundry.io'
        run: unified-doc/publish-unified-doc.sh -ds

      - name: Update sitemap baseline
        if: success()
        run: cp unified-doc/build-site/sitemap.xml unified-doc/sitemap-baseline.xml

      - name: Cache sitemap baseline
        if: success()
        uses: actions/cache/save@v4
        with:
          path: unified-doc/sitemap-baseline.xml
          key: sitemap-baseline-${{ github.ref_name }}-${{ github.run_id }}

      - name: Archive output sitemap baseline
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: sitemap-baseline-output
          path: unified-doc/sitemap-baseline.xml
          retention-days: 90

      - name: Upload build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: docusaurus-build-site
          path: unified-doc/build-site/
          retention-days: 7

      - name: Build drift alert context
        id: drift-ctx
        if: failure()
        run: unified-doc/scripts/build-drift-alert-context.sh "$GITHUB_REPOSITORY" "$GITHUB_RUN_ID" "$GITHUB_OUTPUT"

      # Send drift alert disabled pending fix to openziti/ziti-mattermost-action-py
      # (addPushDetails crashes with KeyError: 'forced' on non-push event JSON)
      # - name: Send drift alert
      #   if: failure() && steps.drift-ctx.outputs.has_drift == 'true'
      #   uses: openziti/ziti-mattermost-action-py@v1
      #   with:
      #     zitiId: ${{ secrets.ZITI_MATTERMOST_IDENTITY }}
      #     webhookUrl: ${{ secrets.ZHOOK_URL_DOC_NOTIFICATIONS }}
      #     eventJson: ${{ steps.drift-ctx.outputs.event-json }}
      #     senderUsername: "GitHubZ"

  # Notify the doc-alerts Mattermost channel only when the nightly scheduled
  # run fails. Push/workflow_dispatch runs are watched live by whoever triggered
  # them; the cron is unattended, so we only need a heads-up on failure.
  notify-mattermost:
    name: Notify doc-alerts of nightly build failure
    needs: publish-docs-from-container
    if: always() && github.event_name == 'schedule' && github.repository_owner == 'netfoundry' && needs.publish-docs-from-container.result != 'success' && needs.publish-docs-from-container.outputs.has_drift != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Build schedule event context
        id: ctx
        run: |
          RUN_URL="https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          EVENT_JSON=$(jq -cn \
            --arg repo "$GITHUB_REPOSITORY" \
            --arg repo_url "https://github.com/$GITHUB_REPOSITORY" \
            --arg run_url "$RUN_URL" \
            --arg action "❌ FAILED — [View logs](${RUN_URL})" \
            '{
              repository: { full_name: $repo, html_url: $repo_url, stargazers_count: 0 },
              sender: { login: "ziti-ci", url: "https://api.github.com/users/netfoundry", html_url: "https://github.com/netfoundry", avatar_url: "https://raw.githubusercontent.com/netfoundry/branding/refs/heads/main/images/png/icon/netfoundry-icon-color.png" },
              action: $action,
              schedule: "0 2 * * *",
              run_url: $run_url
            }')
          echo "event-json=$EVENT_JSON" >> "$GITHUB_OUTPUT"
      - uses: openziti/ziti-mattermost-action-py@v1
        with:
          zitiId: ${{ secrets.ZITI_MATTERMOST_IDENTITY }}
          webhookUrl: ${{ secrets.ZHOOK_URL_DOC_NOTIFICATIONS }}
          eventJson: ${{ steps.ctx.outputs.event-json }}
          senderUsername: "GitHubZ"

